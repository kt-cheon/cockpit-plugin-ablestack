<div class="pf-v6-c-backdrop">
  <div class="pf-v6-l-bullseye">
   <div class="pf-v6-c-modal-box pf-m-sm" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-description">
    <button class="pf-v6-c-button pf-m-plain" type="button" aria-label="Close dialog" id="button-close-modal-gluefs-construction">
     <i class="fas fa-times" aria-hidden="true"></i>
    </button>
    <header class="pf-v6-c-modal-box__header">
     <h1 class="pf-v6-c-modal-box__title" id="modal-title-gluefs-construciton">GlueFS 구성</h1>
    </header>
    <div class="pf-v6-c-modal-box__body" id="modal-description-gluefs-construciton">
     <form novalidate class="pf-v6-c-form pf-m-horizontal" style="margin-left:15px;margin-top:32px">
       <section class="pf-v6-c-form__section">
        <div class="pf-v6-c-form__group" id="gluefs-construction-type">
          <div class="pf-v6-c-form__group-label">
            <label class="pf-v6-c-form__label" for="gluefs-construction-type">
              <span class="pf-v6-c-form__label-text">종류</span>
              <span class="pf-v6-c-form__label-required" aria-hidden="true">&#42;</span>
            </label>
          </div>
          <div class="pf-v6-c-form__group-control pf-m-inline">
            <div class="ablestack-menu-dropdown">
              <select class="pf-v6-c-form-control" id="form-select-gluefs-control" name="form-select-gluefs-control" style="width:100%">
                <option value="" selected>선택하십시오.</option>
                <option value="gluefs">gluefs</option>
                <option value="smb">smb</option>
                <option value="nfs">nfs</option>
              </select>
            </div>
          </div>
        </div>
         <div class="pf-v6-c-form__group">
           <div class="pf-v6-c-form__group-label">
             <label class="pf-v6-c-form__label" for="gluefs-construction-mount-path">
               <span class="pf-v6-c-form__label-text">마운트 경로</span>
               <span class="pf-v6-c-form__label-required" aria-hidden="true">&#42;</span>
             </label>
           </div>
           <div class="pf-v6-c-form__group-control pf-m-inline">
             <input class="pf-v6-c-form-control" style="width:50%" type="text" id="gluefs-construction-mount-path" name="gluefs-construction-mount-path"/>
           </div>
         </div>
         <div class="pf-v6-c-form__group">
          <div class="pf-v6-c-form__group-label">
            <label class="pf-v6-c-form__label" for="gluefs-construction-max-capacity">
              <span class="pf-v6-c-form__label-text">용량</span>
            </label>
          </div>
          <div class="pf-v6-c-form__group-control pf-m-inline">
            <input class="pf-v6-c-form-control" style="width:50%" type="text" id="gluefs-construction-max-capacity" name="gluefs-construction-max-capacity"/>
          </div>
        </div>
    </div>
    <footer class="pf-v6-c-modal-box__footer">
     <button class="pf-v6-c-button pf-m-primary" id="buttion-create-modal-gluefs-construction" type="button">확인</button>
     <button class="pf-v6-c-button pf-m-link" id="button-cancel-modal-gluefs-construction" type="button">취소</button>
    </footer>
   </div>
  </div>
 </div>

 <script src="./src/features/glue/gluefs-construction.js"></script>
